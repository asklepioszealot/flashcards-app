<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flashcards</title>
    <style>
      :root {
        --color-bg-primary: #fcfcf9;
        --color-bg-secondary: #ffffff;
        --color-text-primary: #21302a;
        --color-text-secondary: #5f6d66;
        --color-accent: #2f7a56;
        --color-accent-hover: #245f43;
        --color-accent-soft: rgba(47, 122, 86, 0.12);
        --color-emphasis: #1f6647;
        --color-emphasis-strong: #155038;
        --color-border: rgba(79, 95, 88, 0.25);
        --color-card-front: #ffffff;
        --color-card-back: #f8f9fa;
      }

      [data-theme="dark"] {
        --color-bg-primary: #1b1f1d;
        --color-bg-secondary: #232826;
        --color-text-primary: #f2f6f3;
        --color-text-secondary: #a4b0a9;
        --color-accent: #56c49a;
        --color-accent-hover: #45ae86;
        --color-accent-soft: rgba(86, 196, 154, 0.2);
        --color-emphasis: #84e6c0;
        --color-emphasis-strong: #9cf0ce;
        --color-border: rgba(122, 138, 129, 0.34);
        --color-card-front: #2a302d;
        --color-card-back: #313936;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--color-bg-primary);
        color: var(--color-text-primary);
        line-height: 1.6;
        padding: 20px;
        min-height: 100vh;
        transition:
          background-color 0.3s ease,
          color 0.3s ease;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 30px;
        padding: 20px;
        flex-wrap: nowrap;
        gap: 20px;
      }

      .header-left {
        flex: 0 0 260px; /* Mor kutu genişliği kadar uzatıldı */
        min-width: 200px;
      }

      .header-left h1 {
        font-size: 31px;
        margin-bottom: 5px;
        color: var(--color-text-primary);
      }

      .header-left p {
        color: var(--color-text-secondary);
        font-size: 16px;
      }

      .header-controls {
        display: flex;
        align-items: center;
        justify-content: flex-end; /* İçerik esnediği için sağa dayama korunurken alanı dolduracak */
        gap: 10px;
        flex-wrap: nowrap;
        margin-left: auto;
        flex: 1 1 auto;
        min-width: 0;
      }

      .header-controls > * {
        flex-shrink: 1;
      }

      select,
      input[type="number"] {
        padding: 10px 14px;
        border-radius: 8px;
        border: 1px solid var(--color-border);
        background: var(--color-bg-primary);
        color: var(--color-text-primary);
        font-size: 14px;
        cursor: pointer;
        flex: 1;
        min-width: 150px;
      }

      input[type="number"] {
        max-width: 120px;
      }

      .header-controls select,
      .header-controls input[type="number"] {
        flex: 0 0 auto;
      }

      .header-controls select {
        min-width: 180px;
        max-width: 260px;
        flex-grow: 1;
      }

      .header-controls input[type="number"] {
        width: 100px;
        min-width: 100px;
        max-width: 100px;
      }

      .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
        background: var(--color-accent);
        color: white;
      }

      .btn:hover {
        background: var(--color-accent-hover);
      }

      .btn-secondary {
        background: var(--color-bg-primary);
        color: var(--color-text-primary);
        border: 1px solid var(--color-border);
      }

      .btn-secondary:hover {
        background: var(--color-accent-soft);
      }

      .btn-small {
        padding: 7px 14px;
        font-size: 12px;
      }

      /* Eklenen adaptif büyüme kuralları (sarı kısmı mavi kadar yapma ve butonları ölçekleme) */
      .header-controls .btn-small.btn-secondary {
        flex: 1 1 auto;
        font-size: clamp(10px, 1.2vw, 14px);
        padding: clamp(6px, 1vw, 10px) clamp(8px, 1.5vw, 16px);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        white-space: nowrap;
        min-height: 40px;
      }

      .header-controls .btn-small:not(.btn-secondary) {
        flex: 0 0 auto; /* Git butonu sabit kalabilir veya hafif büyüyebilir */
      }

      .card-container {
        perspective: 1000px;
        margin-bottom: 30px;
        width: 100%;
      }

      .card {
        background: var(--color-bg-secondary);
        border-radius: 16px;
        padding: 40px;
        min-height: 456px;
        max-width: none;
        width: 100%;
        margin: 0;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        border: 1px solid var(--color-border);
        cursor: pointer;
        position: relative;
        overflow: hidden;
      }

      .card-face {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        padding: 60px;
        border-radius: 16px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        opacity: 0;
        transform: translateY(8px);
        transition:
          opacity 0.28s ease,
          transform 0.28s ease;
        pointer-events: none;
      }

      .card-front {
        background: var(--color-card-front);
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
        z-index: 2;
      }

      .card-back {
        background: var(--color-card-back);
        z-index: 1;
      }

      .card.flipped .card-front {
        opacity: 0;
        transform: translateY(-8px);
        pointer-events: none;
        z-index: 1;
      }

      .card.flipped .card-back {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
        z-index: 2;
      }

      .card-label {
        font-size: 17px;
        font-weight: 600;
        color: var(--color-accent);
        margin-bottom: 20px;
        text-align: center;
      }

      .card-content {
        font-size: 24px;
        line-height: 1.6;
        color: var(--color-text-primary);
        text-align: center;
        white-space: pre-line;
      }

      .card-back .card-content {
        font-size: 20px;
        text-align: left;
        line-height: 1.8;
      }

      .card-back .card-content strong {
        color: var(--color-accent);
        font-weight: 600;
      }

      .highlight-critical {
        color: var(--color-emphasis-strong);
        font-weight: 700;
      }

      [data-theme="dark"] .highlight-critical {
        color: var(--color-emphasis-strong);
        font-weight: 700;
      }

      .highlight-important {
        color: var(--color-emphasis);
        font-weight: 400;
      }

      [data-theme="dark"] .highlight-important {
        color: var(--color-emphasis);
        font-weight: 400;
      }

      .card-back .card-content strong {
        color: var(--color-emphasis-strong);
      }

      [data-theme="dark"] .card-back .card-content strong {
        color: var(--color-emphasis-strong);
      }

      .navigation {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 20px;
        margin-bottom: 20px;
      }

      .nav-btn {
        padding: 12px 24px;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
        background: var(--color-accent);
        color: white;
        min-width: 120px;
      }

      .nav-btn:hover:not(:disabled) {
        background: var(--color-accent-hover);
      }

      .nav-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .card-counter {
        font-size: 18px;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
      }

      .card-info {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
        flex-wrap: wrap;
      }

      .subject-badge {
        color: var(--color-accent);
        font-size: 13px;
        padding: 8px 20px;
        background: var(--color-accent-soft);
        border: 1px solid var(--color-border);
        border-radius: 6px;
        font-weight: 500;
      }

      .subject-display {
        text-align: center;
        color: var(--color-accent);
        font-size: 13px;
        padding: 8px 16px;
        background: var(--color-accent-soft);
        border: 1px solid var(--color-border);
        border-radius: 6px;
        font-weight: 500;
        display: inline-block;
        margin-top: auto;
      }

      .subject-container {
        text-align: center;
        padding-top: 20px;
      }

      .card-content-wrapper {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .toggle-container {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .toggle-switch {
        position: relative;
        display: inline-block;
        width: 50px;
        height: 26px;
      }

      .toggle-switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .toggle-slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: var(--color-border);
        transition: 0.3s;
        border-radius: 26px;
      }

      .toggle-slider:before {
        position: absolute;
        content: "";
        height: 20px;
        width: 20px;
        left: 3px;
        bottom: 3px;
        background-color: white;
        transition: 0.3s;
        border-radius: 50%;
      }

      input:checked + .toggle-slider {
        background-color: var(--color-accent);
      }

      input:checked + .toggle-slider:before {
        transform: translateX(24px);
      }

      .card-back {
        overflow-y: auto;
      }

      .assessment-panel {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-top: 15px;
        opacity: 0;
        transform: translateY(10px);
        transition:
          opacity 0.3s ease,
          transform 0.3s ease;
        pointer-events: none;
      }

      .assessment-panel.visible {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }

      .assess-btn {
        padding: 10px 20px;
        border: none;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        min-width: 130px;
      }

      .assess-btn.know {
        background: #16a34a;
        color: white;
      }
      .assess-btn.know:hover {
        background: #15803d;
        transform: scale(1.05);
      }
      .assess-btn.review {
        background: #ea580c;
        color: white;
      }
      .assess-btn.review:hover {
        background: #c2410c;
        transform: scale(1.05);
      }
      .assess-btn.dunno {
        background: #dc2626;
        color: white;
      }
      .assess-btn.dunno:hover {
        background: #b91c1c;
        transform: scale(1.05);
      }

      .assess-btn.selected {
        outline: 3px solid var(--color-text-primary);
        outline-offset: 2px;
      }

      .score-bar {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        padding: 10px 20px;
        background: var(--color-bg-secondary);
        border-radius: 10px;
        border: 1px solid var(--color-border);
        margin-bottom: 15px;
        font-size: 15px;
        font-weight: 500;
      }

      .score-item {
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .score-stats {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 18px;
        flex-wrap: wrap;
        width: 100%;
      }

      .score-item .count {
        font-weight: 700;
        font-size: 17px;
        color: var(--color-text-primary);
      }

      .progress-track {
        width: 100%;
        height: 8px;
        background: var(--color-border);
        border-radius: 8px;
        overflow: hidden;
        margin-bottom: 20px;
      }

      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #16a34a, #22c55e);
        border-radius: 8px;
        transition: width 0.5s ease;
        width: 0%;
      }

      .filter-bar {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-bottom: 0;
        flex-wrap: wrap;
        width: 100%;
      }

      .filter-btn {
        padding: 7px 16px;
        border: 1px solid var(--color-border);
        border-radius: 8px;
        background: var(--color-bg-secondary);
        color: var(--color-text-primary);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .filter-btn:hover {
        background: var(--color-accent-soft);
      }
      .filter-btn.active {
        background: var(--color-accent);
        color: white;
        border-color: var(--color-accent);
      }

      .reset-btn {
        padding: 7px 16px;
        border: 1px solid #dc2626;
        border-radius: 8px;
        background: transparent;
        color: #dc2626;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .reset-btn:hover {
        background: #dc2626;
        color: white;
      }

      .kbd-hint {
        text-align: center;
        font-size: 12px;
        color: var(--color-text-secondary);
        margin-top: 10px;
      }

      .build-meta-banner {
        display: none;
        position: fixed;
        right: 12px;
        bottom: 10px;
        padding: 4px 8px;
        border-radius: 6px;
        border: 1px solid var(--color-border);
        background: rgba(255, 255, 255, 0.75);
        color: var(--color-text-secondary);
        font-size: 11px;
        line-height: 1.4;
        max-width: min(75vw, 520px);
        text-align: right;
        backdrop-filter: blur(3px);
      }

      [data-theme="dark"] .build-meta-banner {
        background: rgba(35, 40, 38, 0.8);
      }

      .kbd-hint kbd {
        background: var(--color-bg-secondary);
        border: 1px solid var(--color-border);
        border-radius: 4px;
        padding: 2px 6px;
        font-family: inherit;
        font-size: 11px;
      }

      @media (max-width: 768px) {
        .header {
          flex-direction: column;
          align-items: flex-start;
        }

        .header-controls {
          width: 100%;
          flex-wrap: wrap;
          justify-content: flex-start;
          gap: 10px;
        }

        .header-controls select {
          flex: 1 1 100%;
          min-width: 0;
          max-width: none;
        }

        .header-controls input[type="number"] {
          flex: 0 0 110px;
          width: 110px;
          min-width: 110px;
          max-width: 110px;
        }

        .card {
          padding: 30px 20px;
          min-height: 420px;
        }

        .card-face {
          padding: 40px 25px;
        }

        .card-content {
          font-size: 22px;
        }

        .card-back .card-content {
          font-size: 19px;
        }

        .card-label {
          font-size: 16px;
        }

        .navigation {
          flex-direction: column;
        }

        .nav-btn {
          width: 100%;
        }

        .assessment-panel {
          flex-direction: column;
          gap: 8px;
        }

        .assess-btn {
          min-width: unset;
          width: 100%;
        }
      }
      /* SET MANAGER CSS */
      .set-manager {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: var(--color-bg-primary);
        z-index: 1000;
        padding: 40px 20px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        transition: background-color 0.3s ease;
      }

      .set-manager.hidden {
        display: none;
      }

      .set-manager-header {
        text-align: center;
        margin-bottom: 30px;
      }

      .set-manager-header h1 {
        font-size: 32px;
        color: var(--color-text-primary);
        margin-bottom: 10px;
      }

      .set-manager-header p {
        color: var(--color-text-secondary);
        font-size: 16px;
      }

      .set-list {
        width: 100%;
        max-width: 600px;
        background: var(--color-bg-secondary);
        border: 1px solid var(--color-border);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 30px;
      }

      .set-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 15px 0;
        border-bottom: 1px solid var(--color-border);
      }

      .set-item:last-child {
        border-bottom: none;
        padding-bottom: 0;
      }

      .set-item.empty {
        text-align: center;
        color: var(--color-text-secondary);
        justify-content: center;
        border-bottom: none;
      }

      .set-info {
        display: flex;
        align-items: center;
        gap: 15px;
        flex: 1;
      }

      .set-info input[type="checkbox"] {
        width: 20px;
        height: 20px;
        cursor: pointer;
      }

      .set-details {
        display: flex;
        flex-direction: column;
      }

      .set-title {
        font-weight: 600;
        color: var(--color-text-primary);
        font-size: 16px;
      }

      .set-stats {
        font-size: 13px;
        color: var(--color-text-secondary);
        margin-top: 4px;
      }

      .set-actions {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .set-list-tools {
        width: 100%;
        max-width: 600px;
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-bottom: 15px;
        flex-wrap: wrap;
      }

      .mode-hint {
        width: 100%;
        text-align: center;
        color: var(--color-text-secondary);
        font-size: 13px;
      }

      .btn-danger {
        background: #c2392f;
        color: white;
      }

      .btn-danger:hover {
        background: #a72f26;
      }

      .btn-delete-circle {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        border: 2px solid #dc2626;
        color: #dc2626;
        background: transparent;
        font-size: 18px;
        font-weight: 700;
        line-height: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .btn-delete-circle:hover {
        background: rgba(220, 38, 38, 0.12);
        transform: scale(1.05);
      }

      .undo-toast {
        position: fixed;
        left: 50%;
        bottom: 24px;
        transform: translateX(-50%);
        background: var(--color-bg-secondary);
        border: 1px solid var(--color-border);
        border-left: 4px solid var(--color-accent);
        border-radius: 10px;
        padding: 12px 16px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        display: none;
        align-items: center;
        gap: 12px;
        z-index: 1500;
      }

      .undo-toast button {
        border: none;
        background: var(--color-accent);
        color: white;
        padding: 6px 10px;
        border-radius: 6px;
        cursor: pointer;
      }

    </style>
  </head>
  <body>
    <!-- SET MANAGER -->
    <div id="set-manager" class="set-manager">
      <div class="set-manager-header">
        <h1>📚 Flashcard Setleri</h1>
        <p>Çalışmak istediğin setleri yükle ve başla</p>
      </div>

      <div class="set-list" id="set-list">
        <div class="set-item empty">Henüz set yüklenmedi.</div>
      </div>

      <div class="set-list-tools" id="set-list-tools" style="display: none;">
        <button class="btn btn-small btn-secondary" id="delete-mode-btn" onclick="toggleDeleteMode()">
          Silme Modu: Kapalı
        </button>
        <button class="btn btn-small btn-secondary" id="select-all-btn" onclick="selectAllSets()">
          Tümünü Seç
        </button>
        <button class="btn btn-small btn-secondary" id="clear-selection-btn" onclick="clearSetSelection()">
          Seçimi Kaldır
        </button>
        <button class="btn btn-small btn-danger" id="remove-selected-btn" onclick="removeSelectedSets()" disabled>
          Seçilileri Kaldır
        </button>
        <div class="mode-hint" id="mode-hint">Mod: Derse dahil edilecek setleri seçiyorsun.</div>
      </div>

      <div class="set-actions">
        <label class="btn btn-secondary" style="cursor: pointer;" for="file-picker">📂 Kart Seti Yükle (.json, .md)</label>
        <input type="file" id="file-picker" accept=".json, .txt, .md" multiple hidden onchange="handleFileSelect(event)" />
        <button class="btn" id="start-btn" onclick="startStudy()" disabled>
          ▶ Başla
        </button>
      </div>

      <div style="margin-top: 30px; display: flex; gap: 10px; align-items: center;">
        <span>☀️</span>
        <label class="toggle-switch">
          <input type="checkbox" id="theme-toggle-manager" onchange="toggleTheme(this.checked)" />
          <span class="toggle-slider"></span>
        </label>
        <span>🌙</span>
      </div>

      <div class="kbd-hint" style="margin-top: 20px;">
        <kbd>Space</kbd> Çevir &nbsp; <kbd>←</kbd><kbd>→</kbd> Gezin &nbsp;
        <kbd>1</kbd> Tamam &nbsp; <kbd>2</kbd> Tekrar &nbsp;
        <kbd>3</kbd> Bilmiyorum
      </div>
    </div>

    <div id="undo-toast" class="undo-toast">
      <span id="undo-message">Set kaldırıldı.</span>
      <button onclick="undoLastRemoval()">Geri Al</button>
    </div>

    <!-- MAIN APP CONTAINER -->
    <div class="container" id="app-container" style="display: none;">
      <div class="header">
        <div class="header-left">
          <h1>Flashcards</h1>
          <p>Dr. Ahmet Kara 🩺</p>
        </div>
        <div class="header-controls">
          <select id="topic-select" onchange="filterByTopic()">
            <option value="hepsi">Tüm Başlıklar</option>
          </select>

          <input
            type="number"
            id="jump-input"
            min="1"
            max="20"
            placeholder="Soru No"
          />
          <button class="btn btn-small" onclick="jumpToCard()">Git</button>

          <div class="toggle-container">
            <span>☀️</span>
            <label class="toggle-switch">
              <input
                type="checkbox"
                id="theme-toggle"
                onchange="toggleTheme()"
              />
              <span class="toggle-slider"></span>
            </label>
            <span>🌙</span>
          </div>

          <button class="btn btn-small btn-secondary" onclick="showSetManager()">
            ← Setlere Dön
          </button>

          <button class="btn-secondary btn btn-small" onclick="shuffleCards()">
            🔀 Karıştır
          </button>
          <button class="btn-secondary btn btn-small" onclick="printCards()">
            🖨️ Yazdır
          </button>
        </div>
      </div>

      <div class="score-bar" id="score-bar">
        <div class="score-stats">
          <div class="score-item">
            ✅ <span class="count" id="score-know">0</span>
          </div>
          <div class="score-item">
            🔄 <span class="count" id="score-review">0</span>
          </div>
          <div class="score-item">
            ❌ <span class="count" id="score-dunno">0</span>
          </div>
          <div class="score-item">
            📊 <span class="count" id="score-percent">0/0 (%0)</span>
          </div>
        </div>

        <div class="filter-bar">
          <button class="filter-btn active" onclick="setFilter('all')">
            📋 Tümü
          </button>
          <button class="filter-btn" onclick="setFilter('review')">
            🔄 Tekrar Göz At
          </button>
          <button class="filter-btn" onclick="setFilter('dunno')">
            ❌ Bilmiyorum
          </button>
          <button class="filter-btn" onclick="setFilter('unanswered')">
            ⬜ Değerlendirilmemiş
          </button>
          <button class="reset-btn" onclick="resetProgress()">🗑️ Sıfırla</button>
        </div>
      </div>

      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>

      <div class="navigation">
        <button class="nav-btn" id="prev-btn" onclick="previousCard()">
          ← Önceki
        </button>
        <div class="card-info">
          <div class="card-counter" id="card-counter">1 / 20</div>
        </div>
        <button class="nav-btn" id="next-btn" onclick="nextCard()">
          Sonraki →
        </button>
      </div>

      <div class="card-container">
        <div class="card" id="flashcard" onclick="flipCard()">
          <div class="card-face card-front">
            <div class="card-content-wrapper">
              <div class="card-label">SORU</div>
              <div class="card-content" id="question-text"></div>
            </div>
            <div class="subject-container">
              <div class="subject-display" id="subject-display-front"></div>
            </div>
          </div>
          <div class="card-face card-back">
            <div class="card-content-wrapper">
              <div class="card-label">CEVAP</div>
              <div class="card-content" id="answer-text"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="assessment-panel" id="assessment-panel">
        <button
          class="assess-btn know"
          onclick="assessCard('know')"
          title="Klavye: 1"
        >
          ✅ Tamam
        </button>
        <button
          class="assess-btn review"
          onclick="assessCard('review')"
          title="Klavye: 2"
        >
          🔄 Tekrar Göz At
        </button>
        <button
          class="assess-btn dunno"
          onclick="assessCard('dunno')"
          title="Klavye: 3"
        >
          ❌ Bilmiyorum
        </button>
      </div>
    </div>

    <div class="build-meta-banner" id="build-meta"></div>

    <script src="./src/generated/build-info.js"></script>
    <script src="./src/core/storage.js"></script>
    <script src="./src/ui/theme.js"></script>
    <script src="./src/app/main.js"></script>

  </body>
</html>
