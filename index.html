<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pediatri Çalışması</title>
    <style>
      :root {
        --color-bg-primary: #fcfcf9;
        --color-bg-secondary: #ffffff;
        --color-text-primary: #134252;
        --color-text-secondary: #626c71;
        --color-accent: #218085;
        --color-accent-hover: #1d7480;
        --color-border: rgba(94, 82, 64, 0.2);
        --color-card-front: #ffffff;
        --color-card-back: #f8f9fa;
      }

      [data-theme="dark"] {
        --color-bg-primary: #1f2121;
        --color-bg-secondary: #262828;
        --color-text-primary: #f5f5f9;
        --color-text-secondary: #a7a9a9;
        --color-accent: #32b8c6;
        --color-accent-hover: #2da6b2;
        --color-border: rgba(119, 124, 124, 0.3);
        --color-card-front: #2a2c2c;
        --color-card-back: #323535;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--color-bg-primary);
        color: var(--color-text-primary);
        line-height: 1.6;
        padding: 20px;
        min-height: 100vh;
        transition:
          background-color 0.3s ease,
          color 0.3s ease;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
        padding: 20px;
        flex-wrap: wrap;
        gap: 20px;
      }

      .header-left h1 {
        font-size: 32px;
        margin-bottom: 5px;
        color: var(--color-text-primary);
      }

      .header-left p {
        color: var(--color-text-secondary);
        font-size: 16px;
      }

      .header-controls {
        display: flex;
        align-items: center;
        gap: 15px;
        flex-wrap: wrap;
      }

      .controls-panel {
        background: var(--color-bg-secondary);
        border-radius: 12px;
        padding: 25px;
        margin-bottom: 30px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        border: 1px solid var(--color-border);
      }

      .control-group {
        margin-bottom: 20px;
      }

      .control-group:last-child {
        margin-bottom: 0;
      }

      .control-label {
        display: block;
        font-weight: 600;
        margin-bottom: 10px;
        color: var(--color-text-primary);
        font-size: 14px;
      }

      .control-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      select,
      input[type="number"] {
        padding: 10px 14px;
        border-radius: 8px;
        border: 1px solid var(--color-border);
        background: var(--color-bg-primary);
        color: var(--color-text-primary);
        font-size: 14px;
        cursor: pointer;
        flex: 1;
        min-width: 150px;
      }

      input[type="number"] {
        max-width: 120px;
      }

      .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
        background: var(--color-accent);
        color: white;
      }

      .btn:hover {
        background: var(--color-accent-hover);
      }

      .btn-secondary {
        background: var(--color-bg-primary);
        color: var(--color-text-primary);
        border: 1px solid var(--color-border);
      }

      .btn-secondary:hover {
        background: rgba(33, 128, 133, 0.1);
      }

      .btn-small {
        padding: 8px 16px;
        font-size: 13px;
      }

      .card-container {
        perspective: 1000px;
        margin-bottom: 30px;
      }

      .card {
        background: var(--color-bg-secondary);
        border-radius: 16px;
        padding: 40px;
        min-height: 400px;
        max-width: 900px;
        margin: 0 auto;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        border: 1px solid var(--color-border);
        cursor: pointer;
        transition: transform 0.6s;
        transform-style: preserve-3d;
        position: relative;
      }

      .card.flipped {
        transform: rotateY(180deg);
      }

      .card-face {
        backface-visibility: hidden;
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        padding: 60px;
        border-radius: 16px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .card-front {
        background: var(--color-card-front);
      }

      .card-back {
        background: var(--color-card-back);
        transform: rotateY(180deg);
      }

      .card-label {
        font-size: 14px;
        font-weight: 600;
        color: var(--color-accent);
        margin-bottom: 20px;
        text-align: center;
      }

      .card-content {
        font-size: 20px;
        line-height: 1.6;
        color: var(--color-text-primary);
        text-align: center;
        white-space: pre-line;
      }

      .card-back .card-content {
        font-size: 17px;
        text-align: left;
        line-height: 1.8;
      }

      .card-back .card-content strong {
        color: var(--color-accent);
        font-weight: 600;
      }

      .highlight-critical {
        color: #0d5f6b;
        font-weight: 700;
      }

      [data-theme="dark"] .highlight-critical {
        color: #4dd4e1;
        font-weight: 700;
      }

      .highlight-important {
        color: #0d5f6b;
        font-weight: 400;
      }

      [data-theme="dark"] .highlight-important {
        color: #4dd4e1;
        font-weight: 400;
      }

      .card-back .card-content strong {
        color: #0d5f6b;
      }

      [data-theme="dark"] .card-back .card-content strong {
        color: #4dd4e1;
      }

      .navigation {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 20px;
        margin-bottom: 20px;
      }

      .nav-btn {
        padding: 12px 24px;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
        background: var(--color-accent);
        color: white;
        min-width: 120px;
      }

      .nav-btn:hover:not(:disabled) {
        background: var(--color-accent-hover);
      }

      .nav-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .card-counter {
        font-size: 18px;
        font-weight: 600;
        color: var(--color-text-primary);
        text-align: center;
      }

      .card-info {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
        flex-wrap: wrap;
      }

      .subject-badge {
        color: white;
        font-size: 13px;
        padding: 8px 20px;
        background: var(--color-accent);
        border-radius: 6px;
        font-weight: 500;
      }

      .subject-display {
        text-align: center;
        color: white;
        font-size: 13px;
        padding: 8px 16px;
        background: var(--color-accent);
        border-radius: 6px;
        font-weight: 500;
        display: inline-block;
        margin-top: auto;
      }

      .subject-container {
        text-align: center;
        padding-top: 20px;
      }

      .card-content-wrapper {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .toggle-container {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .toggle-switch {
        position: relative;
        display: inline-block;
        width: 50px;
        height: 26px;
      }

      .toggle-switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .toggle-slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: var(--color-border);
        transition: 0.3s;
        border-radius: 26px;
      }

      .toggle-slider:before {
        position: absolute;
        content: "";
        height: 20px;
        width: 20px;
        left: 3px;
        bottom: 3px;
        background-color: white;
        transition: 0.3s;
        border-radius: 50%;
      }

      input:checked + .toggle-slider {
        background-color: var(--color-accent);
      }

      input:checked + .toggle-slider:before {
        transform: translateX(24px);
      }

      .card-back .card-face,
      .card-back {
        overflow-y: auto;
      }

      .assessment-panel {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-top: 15px;
        opacity: 0;
        transform: translateY(10px);
        transition:
          opacity 0.3s ease,
          transform 0.3s ease;
        pointer-events: none;
      }

      .assessment-panel.visible {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }

      .assess-btn {
        padding: 10px 20px;
        border: none;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        min-width: 130px;
      }

      .assess-btn.know {
        background: #16a34a;
        color: white;
      }
      .assess-btn.know:hover {
        background: #15803d;
        transform: scale(1.05);
      }
      .assess-btn.review {
        background: #ea580c;
        color: white;
      }
      .assess-btn.review:hover {
        background: #c2410c;
        transform: scale(1.05);
      }
      .assess-btn.dunno {
        background: #dc2626;
        color: white;
      }
      .assess-btn.dunno:hover {
        background: #b91c1c;
        transform: scale(1.05);
      }

      .assess-btn.selected {
        outline: 3px solid var(--color-text-primary);
        outline-offset: 2px;
      }

      .score-bar {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 18px;
        flex-wrap: wrap;
        padding: 10px 20px;
        background: var(--color-bg-secondary);
        border-radius: 10px;
        border: 1px solid var(--color-border);
        margin-bottom: 15px;
        font-size: 15px;
        font-weight: 500;
      }

      .score-item {
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .score-item .count {
        font-weight: 700;
        font-size: 17px;
        color: var(--color-text-primary);
      }

      .progress-track {
        width: 100%;
        height: 8px;
        background: var(--color-border);
        border-radius: 8px;
        overflow: hidden;
        margin-bottom: 20px;
      }

      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #16a34a, #22c55e);
        border-radius: 8px;
        transition: width 0.5s ease;
        width: 0%;
      }

      .filter-bar {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-bottom: 15px;
        flex-wrap: wrap;
      }

      .filter-btn {
        padding: 7px 16px;
        border: 1px solid var(--color-border);
        border-radius: 8px;
        background: var(--color-bg-secondary);
        color: var(--color-text-primary);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .filter-btn:hover {
        background: rgba(33, 128, 133, 0.1);
      }
      .filter-btn.active {
        background: var(--color-accent);
        color: white;
        border-color: var(--color-accent);
      }

      .reset-btn {
        padding: 7px 16px;
        border: 1px solid #dc2626;
        border-radius: 8px;
        background: transparent;
        color: #dc2626;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .reset-btn:hover {
        background: #dc2626;
        color: white;
      }

      .kbd-hint {
        text-align: center;
        font-size: 12px;
        color: var(--color-text-secondary);
        margin-top: 10px;
      }

      .kbd-hint kbd {
        background: var(--color-bg-secondary);
        border: 1px solid var(--color-border);
        border-radius: 4px;
        padding: 2px 6px;
        font-family: inherit;
        font-size: 11px;
      }

      @media (max-width: 768px) {
        .header {
          flex-direction: column;
          align-items: flex-start;
        }

        .header-controls {
          width: 100%;
        }

        .card {
          padding: 30px 20px;
          min-height: 350px;
        }

        .card-face {
          padding: 40px 25px;
        }

        .card-content {
          font-size: 18px;
        }

        .card-back .card-content {
          font-size: 16px;
        }

        .control-row {
          flex-direction: column;
        }

        .navigation {
          flex-direction: column;
        }

        .nav-btn {
          width: 100%;
        }

        .assessment-panel {
          flex-direction: column;
          gap: 8px;
        }

        .assess-btn {
          min-width: unset;
          width: 100%;
        }
      }
      /* SET MANAGER CSS */
      .set-manager {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: var(--color-bg-primary);
        z-index: 1000;
        padding: 40px 20px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        transition: background-color 0.3s ease;
      }

      .set-manager.hidden {
        display: none;
      }

      .set-manager-header {
        text-align: center;
        margin-bottom: 30px;
      }

      .set-manager-header h1 {
        font-size: 32px;
        color: var(--color-text-primary);
        margin-bottom: 10px;
      }

      .set-manager-header p {
        color: var(--color-text-secondary);
        font-size: 16px;
      }

      .set-list {
        width: 100%;
        max-width: 600px;
        background: var(--color-bg-secondary);
        border: 1px solid var(--color-border);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 30px;
      }

      .set-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 15px 0;
        border-bottom: 1px solid var(--color-border);
      }

      .set-item:last-child {
        border-bottom: none;
        padding-bottom: 0;
      }

      .set-item.empty {
        text-align: center;
        color: var(--color-text-secondary);
        justify-content: center;
        border-bottom: none;
      }

      .set-info {
        display: flex;
        align-items: center;
        gap: 15px;
        flex: 1;
      }

      .set-info input[type="checkbox"] {
        width: 20px;
        height: 20px;
        cursor: pointer;
      }

      .set-details {
        display: flex;
        flex-direction: column;
      }

      .set-title {
        font-weight: 600;
        color: var(--color-text-primary);
        font-size: 16px;
      }

      .set-stats {
        font-size: 13px;
        color: var(--color-text-secondary);
        margin-top: 4px;
      }

      .set-actions {
        display: flex;
        gap: 15px;
      }

      .btn-delete-set {
        background: transparent;
        border: 1px solid #dc2626;
        color: #dc2626;
        border-radius: 6px;
        padding: 6px 10px;
        font-size: 12px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .btn-delete-set:hover {
        background: #dc2626;
        color: white;
      }

      .btn-back-to-sets {
        background: var(--color-bg-secondary);
        border: 1px solid var(--color-border);
        color: var(--color-text-primary);
        padding: 8px 16px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        margin-bottom: 20px;
        display: inline-block;
        transition: all 0.2s ease;
      }

      .btn-back-to-sets:hover {
        background: rgba(33, 128, 133, 0.1);
      }
    </style>
  </head>
  <body>
    <!-- SET MANAGER -->
    <div id="set-manager" class="set-manager">
      <div class="set-manager-header">
        <h1>📚 Flashcard Setleri</h1>
        <p>Çalışmak istediğin setleri yükle ve başla</p>
      </div>

      <div class="set-list" id="set-list">
        <div class="set-item empty">Henüz set yüklenmedi.</div>
      </div>

      <div class="set-actions">
        <label class="btn btn-secondary" style="cursor: pointer;" for="file-picker">📂 Kart Seti Yükle (.json, .md)</label>
        <input type="file" id="file-picker" accept=".json, .txt, .md" multiple hidden onchange="handleFileSelect(event)" />
        <button class="btn" id="start-btn" onclick="startStudy()" disabled>
          ▶ Başla
        </button>
      </div>

      <div style="margin-top: 30px; display: flex; gap: 10px; align-items: center;">
        <span>☀️</span>
        <label class="toggle-switch">
          <input type="checkbox" id="theme-toggle-manager" onchange="toggleTheme(this.checked)" />
          <span class="toggle-slider"></span>
        </label>
        <span>🌙</span>
      </div>
    </div>

    <!-- MAIN APP CONTAINER -->
    <div class="container" id="app-container" style="display: none;">
      <button class="btn-back-to-sets" onclick="showSetManager()">← Setlere Dön</button>
      <div class="header">
        <div class="header-left">
          <h1>Pediatri Flashcards</h1>
          <p>Dr. Ahmet Kara 🩺</p>
        </div>
        <div class="header-controls">
          <select id="topic-select" onchange="filterByTopic()">
            <option value="hepsi">Tüm Başlıklar</option>
          </select>

          <input
            type="number"
            id="jump-input"
            min="1"
            max="20"
            placeholder="Soru No"
            style="max-width: 90px"
          />
          <button class="btn btn-small" onclick="jumpToCard()">Git</button>

          <div class="toggle-container">
            <span>☀️</span>
            <label class="toggle-switch">
              <input
                type="checkbox"
                id="theme-toggle"
                onchange="toggleTheme()"
              />
              <span class="toggle-slider"></span>
            </label>
            <span>🌙</span>
          </div>

          <button class="btn-secondary btn btn-small" onclick="shuffleCards()">
            🔀 Karıştır
          </button>
          <button class="btn-secondary btn btn-small" onclick="exportCards()">
            📥 Export
          </button>
          <button class="btn-secondary btn btn-small" onclick="printCards()">
            🖨️ Yazdır
          </button>
        </div>
      </div>

      <div class="score-bar" id="score-bar">
        <div class="score-item">
          ✅ <span class="count" id="score-know">0</span>
        </div>
        <div class="score-item">
          🔄 <span class="count" id="score-review">0</span>
        </div>
        <div class="score-item">
          ❌ <span class="count" id="score-dunno">0</span>
        </div>
        <div class="score-item">
          📊 <span class="count" id="score-percent">0/0 (%0)</span>
        </div>
      </div>

      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>

      <div class="filter-bar">
        <button class="filter-btn active" onclick="setFilter('all')">
          📋 Tümü
        </button>
        <button class="filter-btn" onclick="setFilter('review')">
          🔄 Tekrar Göz At
        </button>
        <button class="filter-btn" onclick="setFilter('dunno')">
          ❌ Bilmiyorum
        </button>
        <button class="filter-btn" onclick="setFilter('unanswered')">
          ⬜ Değerlendirilmemiş
        </button>
        <button class="reset-btn" onclick="resetProgress()">🗑️ Sıfırla</button>
      </div>

      <div class="navigation">
        <button class="nav-btn" id="prev-btn" onclick="previousCard()">
          ← Önceki
        </button>
        <div class="card-info">
          <div class="card-counter" id="card-counter">1 / 20</div>
          <div class="subject-badge" id="subject-badge-nav">
            Kan Transfüzyonu
          </div>
        </div>
        <button class="nav-btn" id="next-btn" onclick="nextCard()">
          Sonraki →
        </button>
      </div>

      <div class="card-container">
        <div class="card" id="flashcard" onclick="flipCard()">
          <div class="card-face card-front">
            <div class="card-content-wrapper">
              <div class="card-label">SORU</div>
              <div class="card-content" id="question-text"></div>
            </div>
            <div class="subject-container">
              <div class="subject-display" id="subject-display-front"></div>
            </div>
          </div>
          <div class="card-face card-back">
            <div class="card-content-wrapper">
              <div class="card-label">CEVAP</div>
              <div class="card-content" id="answer-text"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="assessment-panel" id="assessment-panel">
        <button
          class="assess-btn know"
          onclick="assessCard('know')"
          title="Klavye: 1"
        >
          ✅ Tamam
        </button>
        <button
          class="assess-btn review"
          onclick="assessCard('review')"
          title="Klavye: 2"
        >
          🔄 Tekrar Göz At
        </button>
        <button
          class="assess-btn dunno"
          onclick="assessCard('dunno')"
          title="Klavye: 3"
        >
          ❌ Bilmiyorum
        </button>
      </div>

      <div class="kbd-hint">
        <kbd>Space</kbd> Çevir &nbsp; <kbd>←</kbd><kbd>→</kbd> Gezin &nbsp;
        <kbd>1</kbd> Tamam &nbsp; <kbd>2</kbd> Tekrar &nbsp;
        <kbd>3</kbd> Bilmiyorum
      </div>
    </div>

    <script>
      /*
        ═══════════════════════════════════════════════════════════════════════════════
         AI PROMPT KILAVUZU: FLASHCARD OLUŞTURMA TALİMATI
        ═══════════════════════════════════════════════════════════════════════════════

        [KONU İSMİ] konusu hakkında flashcard formatında soru-cevap kartları oluştur.
        Konunun tüm detayları ele alınmalı. Açıklamalar doyurucu ve öğretici olmalı.

        **Persona ve Kaynaklar:**
        - Yazarken pediatri uzmanı bir hoca gibi düşün ve bir tıp öğrencisine bu konudan neleri sorardın, hangi cevapları beklerdin bunları kurgula.
        - Kartları hazırlarken kaynak olarak **Nelson Pediatrics 22th Ed**, **PubMed**, **AAP**, **Cochrane** gibi güncel kılavuz ve textbook'ları esas alabilirsin.
        - Soru sayısı tüm detayları kapsayacak kadar çok olmalı. Açıklamalar doyurucu ve öğretici olmalı.

        **Format Talimatı:**
        Sorular ve açıklamalar düzgün bir formatta üçlü vurgu sistemine
        uyarak yazılmalı.

        CEVAP FORMATLAMA KURALLARI (Üçlü Vurgu Sistemi):
        - En önemli bilgiler (başlıklar, kritik tanımlar): ==metin==
        - Uyarılar ve dikkat notları: > ⚠️ metin
        - Normal vurgular (terimler, liste başlıkları): **metin**

        ─────────────────────────────────────────────────────────────────────────────
        KART FORMATI (Markdown):
        ─────────────────────────────────────────────────────────────────────────────

        ## [Konu Adı]
        ### [Soru Metni]
        [Cevap Metni (Vurgulu)]

        ─────────────────────────────────────────────────────────────────────────────
        ÖRNEK KART:
        ─────────────────────────────────────────────────────────────────────────────

        ## Kan Transfüzyonu
        ### Eritrosit süspansiyonunda 3 ml/kg verildiğinde Hb kaç g/dL artar?
        <strong class='highlight-critical'>3 ml/kg → Hb 1 g/dL artar</strong>

        Tam kanda ise **7 ml/kg → Hb 1 g/dL artar**

        > ⚠️ Buzdolabından çıkarıldıktan sonra 30 dk içinde verilmeli

        ═══════════════════════════════════════════════════════════════════════════════
      */      // ═══ STATE ═══
      const SESSION_KEY = "fc_session";
      const SETS_KEY = "fc_loaded_sets";
      const ASSESSMENTS_KEY = "fc_assessments";
      
      let loadedSets = {};
      let selectedSets = new Set();
      
      let currentCardIndex = 0;
      let isFlipped = false;
      let allFlashcards = [];
      let filteredFlashcards = [];
      let cardOrder = [];
      let assessments = {}; // key: card question hash → 'know' | 'review' | 'dunno'
      let activeFilter = "all"; // 'all' | 'review' | 'dunno' | 'unanswered'

      // ═══ CARD ID HELPER ═══
      function cardId(card) {
        // simple hash from question text
        let h = 0;
        for (let i = 0; i < card.q.length; i++) {
          h = ((h << 5) - h + card.q.charCodeAt(i)) | 0;
        }
        return "c" + Math.abs(h);
      }

      // ═══ SET MANAGEMENT ═══
      function showSetManager() {
        document.getElementById("set-manager").classList.remove("hidden");
        document.getElementById("app-container").style.display = "none";
        renderSetList();
      }

      function startStudy() {
        if (selectedSets.size === 0) return;
        
        allFlashcards = [];
        for (const setId of selectedSets) {
          if (loadedSets[setId]) {
            allFlashcards.push(...loadedSets[setId].cards);
          }
        }
        
        filteredFlashcards = [...allFlashcards];
        cardOrder = [...Array(filteredFlashcards.length).keys()];
        currentCardIndex = 0;
        
        document.getElementById("set-manager").classList.add("hidden");
        document.getElementById("app-container").style.display = "block";
        
        populateTopicFilter();
        
        const sessRaw = localStorage.getItem(SESSION_KEY);
        if (sessRaw) {
          const session = JSON.parse(sessRaw);
          if (session.topic) document.getElementById("topic-select").value = session.topic;
          if (typeof session.currentCardIndex === "number" && session.currentCardIndex < filteredFlashcards.length) {
            currentCardIndex = session.currentCardIndex;
          }
        }
        
        filterByTopic(false);
      }

      function parseMarkdownToFlashcards(content, fileName) {
        const lines = content.split(/\r?\n/);
        
        let setName = "";
        let currentSubject = "";
        const cards = [];
        
        let currentCard = null;
        let answerLines = [];

        function finalizeCurrentCard() {
          if (currentCard) {
            let answerHtml = answerLines.join('\n').trim();
            
            // ==metin== -> <strong class='highlight-critical'>metin</strong>
            answerHtml = answerHtml.replace(/==([^=]+)==/g, "<strong class='highlight-critical'>$1</strong>");
            
            // **metin** -> <strong>metin</strong>
            answerHtml = answerHtml.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
            
            // > ⚠️ metin -> <span class='highlight-important'>⚠️ metin</span>
            answerHtml = answerHtml.replace(/^(?:> )?⚠️(.*)$/gm, "<span class='highlight-important'>⚠️$1</span>");
            
            // Empty lines -> <br><br>
            answerHtml = answerHtml.replace(/\n\s*\n/g, "<br><br>\n");
            
            currentCard.a = answerHtml;
            cards.push(currentCard);
            
            currentCard = null;
            answerLines = [];
          }
        }

        for (let i = 0; i < lines.length; i++) {
          const line = lines[i];
          
          if (line.trim() === '---') continue;
          
          const h2Match = line.match(/^##\s+(.+)$/);
          if (h2Match) {
            finalizeCurrentCard();
            const title = h2Match[1].trim();
            currentSubject = title;
            if (!setName) setName = title;
            continue;
          }
          
          const h3Match = line.match(/^###\s+(.+)$/);
          if (h3Match) {
            finalizeCurrentCard();
            currentCard = {
              q: h3Match[1].trim(),
              a: "",
              subject: currentSubject || setName || "Genel"
            };
            continue;
          }
          
          if (currentCard) {
            answerLines.push(line);
          }
        }
        
        finalizeCurrentCard();
        
        return {
          setName: setName || fileName.replace(/\.[^/.]+$/, ""),
          cards
        };
      }

      async function handleFileSelect(event) {
        const files = event.target.files;
        if (!files.length) return;
        
        for (const file of files) {
          try {
            const text = await file.text();
            let data;
            
            if (file.name.endsWith('.md') || file.name.endsWith('.txt')) {
                data = parseMarkdownToFlashcards(text, file.name);
            } else {
                data = JSON.parse(text);
            }
            
            const setId = file.name.replace(/\.[^/.]+$/, "");
            
            loadedSets[setId] = {
              setName: data.setName || setId,
              cards: data.cards || [],
              fileName: file.name
            };
            selectedSets.add(setId);
            
            localStorage.setItem("fc_set_" + setId, JSON.stringify(loadedSets[setId]));
          } catch (e) {
            alert(file.name + " yüklenirken hata oluştu. Geçerli bir JSON dosyası seçtiğinizden emin olun.");
          }
        }
        saveSetsList();
        renderSetList();
        event.target.value = ""; // reset
      }

      function toggleSetSelection(setId) {
        if (selectedSets.has(setId)) {
          selectedSets.delete(setId);
        } else {
          selectedSets.add(setId);
        }
        saveSetsList();
        renderSetList();
      }

      function deleteSet(setId) {
        if (!confirm("Bu seti listeden kaldırmak istediğinize emin misiniz? (Değerlendirme verileriniz silinmez)")) return;
        
        delete loadedSets[setId];
        selectedSets.delete(setId);
        localStorage.removeItem("fc_set_" + setId);
        saveSetsList();
        renderSetList();
      }

      function saveSetsList() {
        localStorage.setItem(SETS_KEY, JSON.stringify(Object.keys(loadedSets)));
        const selectedArr = Array.from(selectedSets);
        localStorage.setItem("fc_selected_sets", JSON.stringify(selectedArr));
      }

      function renderSetList() {
        const listEl = document.getElementById("set-list");
        const setIds = Object.keys(loadedSets);
        
        if (setIds.length === 0) {
          listEl.innerHTML = '<div class="set-item empty">Henüz set yüklenmedi.</div>';
          document.getElementById("start-btn").disabled = true;
          return;
        }
        
        listEl.innerHTML = "";
        setIds.forEach(setId => {
          const set = loadedSets[setId];
          let know = 0, total = set.cards.length;
          set.cards.forEach(c => {
            if (assessments[cardId(c)] === 'know') know++;
          });
          
          const isSelected = selectedSets.has(setId);
          
          const div = document.createElement("div");
          div.className = "set-item";
          div.innerHTML = `
            <div class="set-info">
              <input type="checkbox" ${isSelected ? "checked" : ""} onchange="toggleSetSelection('${setId}')">
              <div class="set-details">
                <div class="set-title">${set.setName}</div>
                <div class="set-stats">${total} kart — ${know}/${total} (%${total?Math.round((know/total)*100):0}) tamam</div>
              </div>
            </div>
            <div class="set-actions-row">
              <button class="btn-delete-set" onclick="deleteSet('${setId}')">SİL</button>
            </div>
          `;
          listEl.appendChild(div);
        });
        
        document.getElementById("start-btn").disabled = selectedSets.size === 0;
      }

      // ═══ LOCAL STORAGE ═══
      function saveState() {
        localStorage.setItem(ASSESSMENTS_KEY, JSON.stringify(assessments));
        
        const session = {
          currentCardIndex,
          theme: document.getElementById("theme-toggle").checked ? "dark" : "light",
          topic: document.getElementById("topic-select").value,
          activeFilter
        };
        localStorage.setItem(SESSION_KEY, JSON.stringify(session));
      }

      function loadState() {
        try {
          // Backward compatibility migration from legacy state
          const legacyStateRaw = localStorage.getItem("flashcards_state_v6");
          if (legacyStateRaw) {
            const legacyState = JSON.parse(legacyStateRaw);
            if (legacyState.assessments && Object.keys(assessments).length === 0) {
              assessments = legacyState.assessments;
              localStorage.setItem(ASSESSMENTS_KEY, JSON.stringify(assessments));
            }
          }

          const assRaw = localStorage.getItem(ASSESSMENTS_KEY);
          if (assRaw) assessments = JSON.parse(assRaw);

          const setsRaw = localStorage.getItem(SETS_KEY);
          if (setsRaw) {
            const setIds = JSON.parse(setsRaw);
            setIds.forEach(id => {
              const setRaw = localStorage.getItem("fc_set_" + id);
              if (setRaw) {
                loadedSets[id] = JSON.parse(setRaw);
              }
            });
          }
          
          const selRaw = localStorage.getItem("fc_selected_sets");
          if (selRaw) {
            const selIds = JSON.parse(selRaw);
            selIds.forEach(id => { if (loadedSets[id]) selectedSets.add(id); });
          } else {
            // default all to selected
            Object.keys(loadedSets).forEach(id => selectedSets.add(id));
          }

          const sessRaw = localStorage.getItem(SESSION_KEY);
          if (sessRaw) {
            const session = JSON.parse(sessRaw);
            if (session.theme === "dark") {
              if(document.getElementById("theme-toggle")) document.getElementById("theme-toggle").checked = true;
              if(document.getElementById("theme-toggle-manager")) document.getElementById("theme-toggle-manager").checked = true;
              document.documentElement.setAttribute("data-theme", "dark");
            }
            if (session.activeFilter) activeFilter = session.activeFilter;
          }
        } catch (e) {
          console.error("State loading error:", e);
        }
      }

      // ═══ ASSESSMENT ═══
      function assessCard(level) {
        if (filteredFlashcards.length === 0) return;
        const card = filteredFlashcards[cardOrder[currentCardIndex]];
        const id = cardId(card);
        assessments[id] = level;
        updateAssessmentButtons(level);
        updateScoreDisplay();
        saveState();
        // auto-advance after a short delay
        setTimeout(() => {
          if (currentCardIndex < filteredFlashcards.length - 1) {
            nextCard();
          }
        }, 400);
      }

      function updateAssessmentButtons(level) {
        document
          .querySelectorAll(".assess-btn")
          .forEach((btn) => btn.classList.remove("selected"));
        if (level) {
          const btn = document.querySelector(`.assess-btn.${level}`);
          if (btn) btn.classList.add("selected");
        }
      }

      function showAssessmentPanel(show) {
        const panel = document.getElementById("assessment-panel");
        if (show) {
          panel.classList.add("visible");
        } else {
          panel.classList.remove("visible");
        }
      }

      // ═══ SCORE DISPLAY ═══
      function updateScoreDisplay() {
        let know = 0,
          review = 0,
          dunno = 0;
        allFlashcards.forEach((c) => {
          const status = assessments[cardId(c)];
          if (status === "know") know++;
          else if (status === "review") review++;
          else if (status === "dunno") dunno++;
        });
        const total = allFlashcards.length;
        const pct = total > 0 ? Math.round((know / total) * 100) : 0;
        document.getElementById("score-know").textContent = know;
        document.getElementById("score-review").textContent = review;
        document.getElementById("score-dunno").textContent = dunno;
        document.getElementById("score-percent").textContent =
          `${know}/${total} (%${pct})`;
        document.getElementById("progress-fill").style.width = `${pct}%`;
      }

      // ═══ FILTER ═══
      function setFilter(filter) {
        activeFilter = filter;
        applyAssessmentFilter();
        saveState();
      }

      function applyAssessmentFilter() {
        // update active button
        document
          .querySelectorAll(".filter-btn")
          .forEach((btn) => btn.classList.remove("active"));
        const labels = {
          all: "📋 Tümü",
          review: "🔄 Tekrar Göz At",
          dunno: "❌ Bilmiyorum",
          unanswered: "⬜ Değerlendirilmemiş",
        };
        document.querySelectorAll(".filter-btn").forEach((btn) => {
          if (btn.textContent.trim() === labels[activeFilter])
            btn.classList.add("active");
        });

        const selectedTopic = document.getElementById("topic-select").value;
        let base =
          selectedTopic === "hepsi"
            ? [...allFlashcards]
            : allFlashcards.filter((c) => c.subject === selectedTopic);

        if (activeFilter === "review") {
          filteredFlashcards = base.filter(
            (c) => assessments[cardId(c)] === "review",
          );
        } else if (activeFilter === "dunno") {
          filteredFlashcards = base.filter(
            (c) => assessments[cardId(c)] === "dunno",
          );
        } else if (activeFilter === "unanswered") {
          filteredFlashcards = base.filter((c) => !assessments[cardId(c)]);
        } else {
          filteredFlashcards = base;
        }

        cardOrder = [...Array(filteredFlashcards.length).keys()];
        currentCardIndex = 0;
        document
          .getElementById("jump-input")
          .setAttribute("max", filteredFlashcards.length);
        if (filteredFlashcards.length > 0) {
          displayCard();
        } else {
          document.getElementById("question-text").textContent =
            "Bu kategoride kart yok.";
          document.getElementById("answer-text").innerHTML = "";
          document.getElementById("card-counter").textContent = "0 / 0";
          document.getElementById("subject-badge-nav").textContent = "-";
          document.getElementById("subject-display-front").textContent = "";
          showAssessmentPanel(false);
        }
        updateScoreDisplay();
      }

      function resetProgress() {
        if (!confirm("Tüm ilerlemeniz sıfırlanacak. Emin misiniz?")) return;
        assessments = {};
        activeFilter = "all";
        applyAssessmentFilter();
        updateScoreDisplay();
        saveState();
      }

      // ═══ TOPIC FILTER ═══
      function filterByTopic(resetFilter = true) {
        if (resetFilter) {
          activeFilter = "all";
        }
        applyAssessmentFilter();
      }

      // ═══ DISPLAY ═══
      function displayCard() {
        if (filteredFlashcards.length === 0) return;
        const card = filteredFlashcards[cardOrder[currentCardIndex]];
        document.getElementById("question-text").textContent = card.q;
        document.getElementById("answer-text").innerHTML = card.a;
        document.getElementById("card-counter").textContent =
          `${currentCardIndex + 1} / ${filteredFlashcards.length}`;
        document.getElementById("subject-display-front").textContent =
          card.subject;
        document.getElementById("subject-badge-nav").textContent = card.subject;

        document.getElementById("prev-btn").disabled = currentCardIndex === 0;
        document.getElementById("next-btn").disabled =
          currentCardIndex === filteredFlashcards.length - 1;

        // reset flip
        if (isFlipped) {
          document.getElementById("flashcard").classList.remove("flipped");
          isFlipped = false;
        }
        // hide assessment panel when showing front
        showAssessmentPanel(false);
        // highlight current assessment if any
        const currentAssessment = assessments[cardId(card)];
        updateAssessmentButtons(currentAssessment || null);

        saveState();
      }

      // ═══ FLIP ═══
      function flipCard() {
        const card = document.getElementById("flashcard");
        card.classList.toggle("flipped");
        isFlipped = !isFlipped;
        showAssessmentPanel(isFlipped);
      }

      // ═══ NAVIGATION ═══
      function previousCard() {
        if (currentCardIndex > 0) {
          currentCardIndex--;
          displayCard();
        }
      }

      function nextCard() {
        if (currentCardIndex < filteredFlashcards.length - 1) {
          currentCardIndex++;
          displayCard();
        }
      }

      function jumpToCard() {
        const input = document.getElementById("jump-input");
        const cardNum = parseInt(input.value);
        if (cardNum >= 1 && cardNum <= filteredFlashcards.length) {
          currentCardIndex = cardNum - 1;
          displayCard();
          input.value = "";
        } else {
          alert(
            `Lütfen 1 ile ${filteredFlashcards.length} arasında bir sayı girin.`,
          );
        }
      }

      document
        .getElementById("jump-input")
        .addEventListener("keypress", function (e) {
          if (e.key === "Enter") jumpToCard();
        });

      // ═══ THEME ═══
      function toggleTheme(isChecked) {
        let isDark;
        if (typeof isChecked === 'boolean') {
           isDark = isChecked;
           if(document.getElementById("theme-toggle")) document.getElementById("theme-toggle").checked = isDark;
           if(document.getElementById("theme-toggle-manager")) document.getElementById("theme-toggle-manager").checked = isDark;
        } else {
           isDark = document.getElementById("theme-toggle").checked;
           if(document.getElementById("theme-toggle-manager")) document.getElementById("theme-toggle-manager").checked = isDark;
        }
        
        if (isDark) {
          document.documentElement.setAttribute("data-theme", "dark");
        } else {
          document.documentElement.removeAttribute("data-theme");
        }
        saveState();
      }

      // ═══ SHUFFLE ═══
      function shuffleCards() {
        if (filteredFlashcards.length === 0) return;
        for (let i = cardOrder.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [cardOrder[i], cardOrder[j]] = [cardOrder[j], cardOrder[i]];
        }
        currentCardIndex = 0;
        displayCard();
      }

      // ═══ EXPORT ═══
      function exportCards() {
        // We can export either all loaded sets or just the selected ones.
        // Let's export allFlashcards for simplicity as a combined set.
        const dataStr = JSON.stringify(allFlashcards, null, 2);
        const dataBlob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(dataBlob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "kan-transfuzyonu-flashcards.json";
        link.click();
        URL.revokeObjectURL(url);
      }

      // ═══ PRINT ═══
      function printCards() {
        const statusIcons = { know: "✅", review: "🔄", dunno: "❌" };
        let cardsHtml = "";
        allFlashcards.forEach((card, i) => {
          const status = assessments[cardId(card)];
          const badge = status
            ? `<span style="float:right;font-size:18px">${statusIcons[status]}</span>`
            : "";
          cardsHtml += `
                <div style="page-break-inside:avoid; border:1px solid #ddd; border-radius:10px; padding:20px 24px; margin-bottom:16px;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                        <span style="font-weight:700; color:#218085; font-size:14px;">Kart ${i + 1} — ${card.subject}</span>
                        ${badge}
                    </div>
                    <div style="font-size:15px; font-weight:600; margin-bottom:12px; color:#134252; white-space: pre-line;">${card.q}</div>
                    <div style="font-size:14px; line-height:1.7; color:#333; border-top:1px solid #eee; padding-top:12px; white-space: pre-line;">${card.a}</div>
                </div>`;
        });

        let know = 0,
          review = 0,
          dunno = 0;
        allFlashcards.forEach((c) => {
          const s = assessments[cardId(c)];
          if (s === "know") know++;
          else if (s === "review") review++;
          else if (s === "dunno") dunno++;
        });
        const total = allFlashcards.length;
        const pct = total > 0 ? Math.round((know / total) * 100) : 0;

        const html = `<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8">
            <title>Kan Transfüzyonu Flashcards — Yazdır</title>
            <style>
                body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width:800px; margin:0 auto; padding:30px 20px; color:#134252; }
                h1 { font-size:22px; margin-bottom:4px; }
                .summary { font-size:14px; color:#626c71; margin-bottom:20px; padding-bottom:15px; border-bottom:2px solid #218085; }
                @media print { body { padding:10px; } }
            </style></head><body>
            <h1>Kan Transfüzyonu — Flashcards</h1>
            <div class="summary">Toplam: ${total} kart &nbsp;|&nbsp; ✅ ${know} &nbsp; 🔄 ${review} &nbsp; ❌ ${dunno} &nbsp;|&nbsp; Tamamlanma: %${pct}</div>
            ${cardsHtml}
            </body></html>`;

        const w = window.open("", "_blank");
        w.document.write(html);
        w.document.close();
        w.onload = () => w.print();
      }

      // ═══ KEYBOARD ═══
      document.addEventListener("keydown", function (e) {
        // skip if typing in input
        if (e.target.tagName === "INPUT" || e.target.tagName === "SELECT")
          return;
        if (e.key === "ArrowLeft") {
          previousCard();
        } else if (e.key === "ArrowRight") {
          nextCard();
        } else if (e.key === " ") {
          e.preventDefault();
          flipCard();
        } else if (e.key === "1" && isFlipped) {
          assessCard("know");
        } else if (e.key === "2" && isFlipped) {
          assessCard("review");
        } else if (e.key === "3" && isFlipped) {
          assessCard("dunno");
        } else if (e.key === "ArrowDown" && isFlipped) {
          e.preventDefault();
          document.querySelector(".card-back").scrollTop += 50;
        } else if (e.key === "ArrowUp" && isFlipped) {
          e.preventDefault();
          document.querySelector(".card-back").scrollTop -= 50;
        }
      });

      // ═══ INIT ═══
      function populateTopicFilter() {
        const select = document.getElementById("topic-select");
        const subjects = [...new Set(allFlashcards.map((c) => c.subject))];
        select.innerHTML = '<option value="hepsi">Tüm Başlıklar</option>';
        subjects.forEach((subject) => {
          const option = document.createElement("option");
          option.value = subject;
          option.textContent = subject;
          select.appendChild(option);
        });
      }

      // Initialization routine
      loadState();
      showSetManager();
    </script>
  </body>
</html>
